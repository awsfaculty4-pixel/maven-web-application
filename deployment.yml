apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-deployment
  labels:
    app: java-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:
      - name: java-container
        image: awsfaculty4/my-app:latest  # Aapki Docker Hub image
        imagePullPolicy: Always           # Taaki har baar naya code download ho
        ports:
        - containerPort: 8080             # Java apps aksar 8080 par chalti hain (check karei

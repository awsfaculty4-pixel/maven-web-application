apiVersion: v1
kind: Service
metadata:
  name: java-app-service
spec:
  type: NodePort
  selector:
    app: java-app
  ports:
    - port: 80          # Service ka bahari port
      targetPort: 8080  # Aapki application ka asli port (Java ke liye 8080)
      nodePort: 30008   # Browser mein access karne ke liye port
